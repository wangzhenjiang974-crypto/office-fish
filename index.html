<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>办公室摸鱼</title>
  <style>
    * { margin: 0; padding: 0; }
    body { font-family: Arial; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    #game { background: white; border-radius: 20px; padding: 20px; max-width: 500px; width: 100%; }
    #header { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 10px; background: #f0f0f0; border-radius: 10px; }
    #timer { font-size: 24px; font-weight: bold; color: #e74c3c; }
    #board { position: relative; height: 300px; background: #f9f9f9; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
    .item { position: absolute; width: 50px; height: 50px; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 24px; user-select: none; }
    .item:hover { transform: scale(1.1); }
    #slots { display: flex; justify-content: center; gap: 5px; padding: 10px; background: #333; border-radius: 10px; min-height: 60px; }
    .slot { width: 50px; height: 50px; background: #555; border: 2px solid #777; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 24px; }
    #boss { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: red; color: white; padding: 40px; border-radius: 20px; font-size: 32px; display: none; z-index: 1000; }
    #work-btn { margin-top: 20px; padding: 15px 40px; font-size: 20px; background: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; }
    #over { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 20px; text-align: center; display: none; }
    #over h2 { color: #e74c3c; margin-bottom: 20px; }
    #restart { padding: 10px 30px; font-size: 18px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 10px; }
    #start { text-align: center; padding: 40px; }
    #start h1 { font-size: 36px; margin-bottom: 10px; }
    #start p { color: #666; margin-bottom: 30px; }
    #start-btn { padding: 15px 50px; font-size: 24px; background: #2ecc71; color: white; border: none; border-radius: 10px; cursor: pointer; }
    .t0 { background: #bdc3c7; } .t1 { background: #8b4513; } .t2 { background: #6495ed; } .t3 { background: #2c3e50; color: white; } .t4 { background: #f4d03f; } .t5 { background: #27ae60; }
  </style>
</head>
<body>
  <div id="game">
    <div id="start">
      <h1>🐟 办公室摸鱼</h1>
      <p>上班摸鱼被抓？这游戏太真实了！</p>
      <p style="font-size:14px;color:#999;margin-top:20px;">玩法：点击物品放入槽位，凑齐 3 个消除<br>注意：老板会突然出现，快速点击"假装工作"！</p>
      <button id="start-btn">开始摸鱼</button>
    </div>
    <div id="screen" style="display:none;">
      <div id="header"><span id="level">第 1 关</span><span id="timer">⏱️ 3:00</span></div>
      <div id="board"></div>
      <div id="slots"><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div>
    </div>
  </div>
  <div id="boss">👔 老板来了！<button id="work-btn">💻 假装工作</button></div>
  <div id="over"><h2>😭 被抓到了！</h2><p id="reason">槽位满了</p><button id="restart">重新开始</button></div>
  <script>
    const ICONS=['📄','☕','📱','💻','🍕','🎧'];
    let state={slots:[],items:[],timer:180,playing:false,boss:false};
    let timerInt,bossInt;
